<!DOCTYPE html>
<html>
<head>
    <title>Highlight Bold Words</title>
    <style>
        .highlight {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<p>
<a href="#" onmouseover="highlight()" onmouseout="removeHighlight()">
[On mouse over here bold words will be highlighted]
</a>
</p>

<p id="para">
We have just started <b>this</b> section for the users (<b>beginner</b> to intermediate) who 
<b>want</b> to work with <b>various</b> JavaScript <b>problems</b> and write scripts online 
to <b>test</b> their JavaScript <b>skill</b>.
</p>

<script>
function highlight() {
    let boldWords = document.querySelectorAll("#para b");
    boldWords.forEach(word => {
        word.classList.add("highlight");
    });
}

function removeHighlight() {
    let boldWords = document.querySelectorAll("#para b");
    boldWords.forEach(word => {
        word.classList.remove("highlight");
    });
}
</script>

</body>
</html>
